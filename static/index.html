<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kidstream</title>
    <link rel="icon" type="image/png" href="/favicon.png?v=2">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="#/" aria-label="Home">
        <img class="brand-mark" src="/kidstream-logo.png" alt="" aria-hidden="true">
        <span class="brand-name" data-app-name>Kidstream</span>
      </a>
      <form class="search" data-search-form>
        <input data-search-input type="search" name="q" autocomplete="off" placeholder="Search">
        <button type="submit" aria-label="Search">
          <span>Search</span>
        </button>
      </form>
    </header>

    <div class="layout">
      <aside class="sidebar" data-sidebar></aside>
      <main class="content" data-app>
        <div class="loading">Loading videos...</div>
      </main>
    </div>

    <template id="video-card-template">
      <article class="video-card">
        <a class="watch-card-link">
          <div class="thumb-wrap">
            <img class="thumb" alt="">
            <span class="duration"></span>
          </div>
        </a>
          <div class="video-meta">
            <div class="avatar-dot" aria-hidden="true"></div>
            <a class="watch-card-link video-copy">
              <h3></h3>
              <p class="channel-name"></p>
              <p class="posted-date"></p>
            </a>
            <button class="icon-button card-hide-button" type="button" aria-label="Hide this video" title="Hide this video"></button>
          </div>
      </article>
    </template>

    <script src="/app.js" defer></script>
  </body>
</html>
